name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  flatpak-build:
    name: Flatpak Build (${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    strategy:
      matrix:
        target:
          - id: flatpak-x86_64
            arch: x86_64
            runner: ubuntu-24.04
          - id: flatpak-aarch64
            arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build
        uses: flatpak/flatpak-github-actions/flatpak-builder@92ae9851ad316786193b1fd3f40c4b51eb5cb101 # v6.6
        with:
          bundle: dev.skillless.Scanline.${{ matrix.target.arch }}.flatpak
          manifest-path: dev.skillless.Scanline.json
          arch: ${{ matrix.target.arch }}
          cache-key: flatpak-builder-${{ matrix.target.arch }}-${{ github.sha }}
      - name: Upload Bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dev.skillless.Scanline.${{ matrix.target.arch }}.flatpak
          path: dev.skillless.Scanline.${{ matrix.target.arch }}.flatpak
          retention-days: 1

  release:
    name: Create Release
    needs: flatpak-build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download Bundles
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          merge-multiple: true
      - name: Determine previous tag
        id: prev_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT="${GITHUB_REF#refs/tags/}"
          PREV=$(gh api repos/${{ github.repository }}/releases --jq "[.[] | select(.tag_name != \"$CURRENT\")][0].tag_name // \"\"")
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV="${{ steps.prev_tag.outputs.tag }}"
          ARGS=(-f tag_name="$TAG")
          if [ -n "$PREV" ]; then
            ARGS+=(-f previous_tag_name="$PREV")
          fi
          BODY=$(gh api repos/${{ github.repository }}/releases/generate-notes "${ARGS[@]}" --jq .body)
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "$BODY"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          body: ${{ steps.notes.outputs.body }}
          files: '*.flatpak'
